<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menú - Burger House</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:white;
padding-bottom:90px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:26px;
font-weight:800;
color:#ff9800;
}

/* CART */
.cart{
position:fixed;
top:20px;
right:20px;
background:#ff9800;
color:black;
padding:12px 15px;
border-radius:50px;
font-weight:800;
cursor:pointer;
z-index:999;
}

/* TITLE */
.title{
text-align:center;
padding:20px;
}

.title h1{
font-size:32px;
}
.title span{color:#ff9800;}

/* MENU DESKTOP */
.menu{
padding:40px 8%;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
overflow:hidden;
transition:.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
cursor:pointer;
}

.card-body{
padding:12px;
flex:1;
}

.card h3{
font-size:18px;
}

.card p{
font-size:13px;
color:#aaa;
margin:5px 0;
}

.price{
color:#ff9800;
font-weight:700;
margin-top:5px;
}

/* BOTÓN */
.add-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff9800;
font-weight:800;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

.add-btn:hover{
transform:scale(1.03);
}

/* MOBILE */
@media(max-width:768px){

.menu{padding:15px;}

.cards{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
flex-direction:row;
align-items:center;
padding:10px;
gap:12px;
border-radius:15px;
}

.card img{
width:75px;
height:75px;
border-radius:12px;
}

.card-body{
flex:1;
padding:0;
}

.card h3{font-size:15px;}
.card p{font-size:12px;}
.price{font-size:14px;}

.add-btn{
width:42px;
height:42px;
min-width:42px;
padding:0;
border-radius:12px;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
margin-top:0;
}
}

/* NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
z-index:999;
}

.nav-item{
background:none;
border:none;
color:#aaa;
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
gap:4px;
cursor:pointer;
}

.nav-item i{font-size:18px;}
.nav-item.active{color:#ff9800;}

.icon-wrapper{position:relative;}

.cart-badge{
position:absolute;
top:-6px;
right:-10px;
background:#ff9800;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:50px;
font-weight:700;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.lightbox img{
max-width:95%;
max-height:90%;
border-radius:12px;
}
/* ================= HERO COMPLETO SIN RECORTE ================= */
.hero-title{
position:relative;
width:100%;
height:220px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin-top:10px;
}

.hero-title img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

/* TEXTO ENCIMA */
.hero-text{
position:absolute;
text-align:center;
}

.hero-text h1{
font-size:34px;
font-weight:800;
color:#fff;
text-shadow:0 4px 20px rgba(0,0,0,.8);
}

.hero-text span{
color:#ff9800;
}

/* MOBILE */
@media(max-width:768px){
.hero-title{
height:170px;
}

.hero-text h1{
font-size:24px;
}
}


/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
padding:18px 8%;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
text-align:center;
}
.logo{
font-size:28px;
font-weight:800;
color:#ff9800;
}

nav{
display:flex;
gap:30px;
}

nav a{
color:#bbb;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#ff9800;
}

</style>
</head>

<body>

<header>
<div class="logo">🍔 Burger House</div>
</header>

<div class="cart">
🛒 <span id="count">0</span>
</div>
<div class="hero-title">
  <img src="1.jpeg" alt="Menú Burger House">

  <div class="hero-text">
    <h1>Nuestro <span>Menú</span></h1>
  </div>
</div>
</div>
<section class="menu">
<div class="cards" id="menu"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="cerrarLightbox()">
  <img id="lightboxImg" src="">
</div>

<nav class="bottom-nav">

<button class="nav-item" onclick="location.href='index.html'">
<i class="fa-solid fa-house"></i>
<span>Inicio</span>
</button>

<button class="nav-item active" onclick="location.href='menu.html'">
<i class="fa-solid fa-burger"></i>
<span>Menú</span>
</button>

<button class="nav-item" onclick="location.href='pedidos.html'">
<div class="icon-wrapper">
<i class="fa-solid fa-box"></i>
<span class="cart-badge" id="cartCount">0</span>
</div>
<span>Pedidos</span>
</button>

<button class="nav-item" onclick="location.href='promos.html'">
<i class="fa-solid fa-tags"></i>
<span>Promos</span>
</button>

</nav><script>
const productos=[
{
nombre:"Doble House",
precio:250,
desc:"Doble de carne, cheddar, bacon y extra de quesillo más barbacoa ! Acompañado de papas y bebida",
img:"3.jpeg",
extras:[
{nombre:"Papas",precio:40},
{nombre:"Gaseosa",precio:25}
]
},
{
nombre:"Club Sandwich",
precio:150,
desc:"Cuatro capas de pan de molde ! Frescos vegetales + queso amarillo y fina mortadela + carne molida de res o pollo + quesillo de exportación + papas y bebida",
img:"4.jpeg",
extras:[
{nombre:"Papas",precio:2},
{nombre:"Gaseosa",precio:1.5}
]
},
{
nombre:"Doble king",
precio:150,
desc:"Doble todo!",
img:"5.jpeg",
extras:[
{nombre:"Papas",precio:2},
{nombre:"Gaseosa",precio:1.5}
]
},
{
nombre:"Monster House",
precio:300,
desc:"Triple mounstrocidad ! Acompañado de papas y bebida",
img:"6.jpeg",
extras:[
{nombre:"Papas",precio:2},
{nombre:"Gaseosa",precio:1.5}
]
},
{
nombre:"El Híbrido",
precio:180,
desc:"Cheese Burger + papas + salsas + bebida",
img:"7.jpeg",
},
{
nombre:"Burrito XL",
precio:160,
desc:"Orden de burritos tamaño xl ! Carne molida de Res o pollo con quesillo de exportación! Salsa, Fina mortadela y frescos vegetales !",
img:"9.jpeg",
extras:[
{nombre:"Papas",precio:2},
{nombre:"Gaseosa",precio:1.5}
]
},

{
nombre:"Carnívora (G)",
precio:200,
desc:"Gigante + salchichas + quesillo de exportación + salsas + carne molida de res + bebida",
img:"10.jpeg",
extras:[
{nombre:"Papas",precio:2},
{nombre:"Gaseosa",precio:1.5}
]
},

{
nombre:"Love and thunder",
precio:200,
desc:"Chesse Burguer + burrito xl + mini papas y Coca-Cola 1lt",
img:"11.jpeg",
},
{
nombre:"Dedos de pollo",
precio:160,
desc:"Orden de dedos de pollo + papas + bebida y salsas a elección",
img:"12.jpeg",
},

{
nombre:"Salchipapa (G)",
precio:150,
desc:"Clásica gigante + quesillo de exportación + salchichas + salsas y bebida",
img:"13.jpeg",
}
];

/* ================= CARRITO ================= */
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* ================= ESTADO ================= */
let productoSeleccionado = null;
let extrasSeleccionados = {};

/* ================= RENDER ================= */
function render(){
let html="";

productos.forEach((p,i)=>{

// 👇 EXTRAS visibles debajo del nombre
let extrasPreview = "";
if(p.extras?.length){
extrasPreview = `
<div style="font-size:12px;color:#aaa;margin-top:4px;">
Extras: ${p.extras.map(e => e.nombre).join(", ")}
</div>
`;
}

html+=`
<div class="card">

<img src="${p.img}" onclick="abrirLightbox('${p.img}')">

<div class="card-body">
<h3>${p.nombre}</h3>

${extrasPreview}

<p>${p.desc}</p>
<div class="price">C$${p.precio}</div>
</div>

<button class="add-btn" onclick="abrirExtras(${i})">
${window.innerWidth <= 768 ? "+" : "Agregar"}
</button>

</div>
`;
});

document.getElementById("menu").innerHTML = html;
update();
}

/* ================= EXTRAS ================= */
function abrirExtras(i){

productoSeleccionado = productos[i];
extrasSeleccionados = {};

let extrasHTML = "";

if(productoSeleccionado.extras?.length){

productoSeleccionado.extras.forEach((e,idx)=>{

extrasHTML+=`
<div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:6px 0;border-bottom:1px solid #222;">
  
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
<input type="checkbox" onchange="toggleExtra(${idx})">
<span>${e.nombre}</span>
</label>

<span style="color:#ff9800;font-weight:bold">+C$${e.precio}</span>

</div>
`;
});

}else{
extrasHTML = `<p style="color:#aaa">Este producto no tiene extras</p>`;
}

let box = document.createElement("div");
box.id="extrasBox";
box.style.position="fixed";
box.style.top="0";
box.style.left="0";
box.style.width="100%";
box.style.height="100%";
box.style.background="rgba(0,0,0,.9)";
box.style.display="flex";
box.style.alignItems="center";
box.style.justifyContent="center";
box.style.zIndex="9999";

box.innerHTML=`
<div style="background:#111;padding:20px;border-radius:15px;width:320px;color:#fff">

<h3>${productoSeleccionado.nombre}</h3>

<div style="margin:10px 0 15px 0;">
${extrasHTML}
</div>

<button onclick="confirmarExtra()" style="
width:100%;
padding:12px;
background:#ff9800;
border:none;
font-weight:800;
border-radius:10px;
cursor:pointer;">
Agregar Extras
</button>

<button onclick="cerrarExtras()" style="
width:100%;
margin-top:10px;
padding:10px;
background:#333;
border:none;
color:#fff;
border-radius:10px;
cursor:pointer;">
Cerrar
</button>

</div>
`;

document.body.appendChild(box);
}

/* ================= TOGGLE ================= */
function toggleExtra(i){
let extra = productoSeleccionado.extras[i];

if(extrasSeleccionados[extra.nombre]){
delete extrasSeleccionados[extra.nombre];
}else{
extrasSeleccionados[extra.nombre] = extra.precio;
}
}

/* ================= CONFIRMAR ================= */
function confirmarExtra(){

let base = productoSeleccionado.precio;
let extraTotal = 0;
let extrasFinal = [];

for(let key in extrasSeleccionados){
extraTotal += extrasSeleccionados[key];

extrasFinal.push({
nombre: key,
precio: extrasSeleccionados[key]
});
}

let total = base + extraTotal;

/* carrito actualizado */
carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* evitar duplicados exactos */
let index = carrito.findIndex(item =>
item.nombre === productoSeleccionado.nombre &&
JSON.stringify(item.extras || []) === JSON.stringify(extrasFinal)
);

if(index !== -1){
carrito[index].qty += 1;
}else{
carrito.push({
nombre: productoSeleccionado.nombre,
precio: total,
desc: productoSeleccionado.desc,
img: productoSeleccionado.img,
qty: 1,
extras: extrasFinal
});
}

localStorage.setItem("carrito", JSON.stringify(carrito));

cerrarExtras();
update();
mostrarToast("✔ Agregado con extras");
}

/* ================= CERRAR ================= */
function cerrarExtras(){
let box = document.getElementById("extrasBox");
if(box) box.remove();
}

/* ================= AGREGAR NORMAL ================= */
function agregar(i){

let producto = productos[i];

carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let index = carrito.findIndex(p => p.nombre === producto.nombre);

if(index !== -1){
carrito[index].qty += 1;
}else{
carrito.push({
nombre: producto.nombre,
precio: producto.precio,
desc: producto.desc,
img: producto.img,
qty: 1,
extras:[]
});
}

localStorage.setItem("carrito", JSON.stringify(carrito));

update();
mostrarToast("✔ Agregado a pedidos");
}

/* ================= UPDATE ================= */
function update(){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let total = 0;

carrito.forEach(p=>{
total += p.qty;
});

document.getElementById("count").innerText = total;

let nav = document.getElementById("cartCount");
if(nav){
nav.innerText = total;
}
}

/* ================= TOAST ================= */
function mostrarToast(msg){
let toast=document.createElement("div");
toast.innerText=msg;

toast.style.position="fixed";
toast.style.bottom="20px";
toast.style.right="20px";
toast.style.background="#ff9800";
toast.style.color="#000";
toast.style.padding="10px 14px";
toast.style.borderRadius="10px";
toast.style.fontWeight="bold";
toast.style.zIndex="9999";

document.body.appendChild(toast);

setTimeout(()=>toast.remove(),1500);
}

/* ================= LIGHTBOX ================= */
function abrirLightbox(img){
document.getElementById("lightboxImg").src = img;
document.getElementById("lightbox").style.display = "flex";
}

function cerrarLightbox(){
document.getElementById("lightbox").style.display = "none";
document.getElementById("lightboxImg").src = "";
}

/* ================= INIT ================= */
render();
update();
</script>
</body>
</html>
